name: Fetch Wind Speed

on:
  schedule:
    - cron: '3,13,23,33,43,53 * * * *'  # offset from :00/:10/... to dodge GitHub's cron congestion
  workflow_dispatch: {}  # allows manual trigger from the Actions tab

permissions:
  contents: write

concurrency:
  group: fetch-wind
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests tzdata

      - name: Fetch wind speed
        env:
          ECOWITT_APPLICATION_KEY: ${{ secrets.ECOWITT_APPLICATION_KEY }}
          ECOWITT_API_KEY: ${{ secrets.ECOWITT_API_KEY }}
          ECOWITT_MAC: ${{ secrets.ECOWITT_MAC }}
        run: python fetch-wind.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wind.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update wind speed data"
          git pull --rebase origin main
          git push
